<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDI-GPT Transition Examples</title>
  <meta name="description" content="Interactive browser for AI-generated music transition videos using MIDI-GPT, with piano-roll visualizations and evaluation metrics.">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div id="app">

  <header>
    <div class="logo">MIDI-GPT <span>Transitions</span></div>
    <div class="stats">
      <span id="stat-songs">—</span> songs ·
      <span id="stat-pairs">—</span> pairs
    </div>
    <div class="spacer"></div>
    <a href="https://github.com/DaoTwenty/MIDI-GPT" target="_blank" rel="noopener"
       style="font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px">
      <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13
                 -.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66
                 .07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15
                 -.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27
                 .68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12
                 .51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
                 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      GitHub
    </a>
  </header>

  <div class="layout">

    <aside id="sidebar">
      <div class="sidebar-top">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89
                    3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
          </svg>
          <input id="search" type="text" placeholder="Search songs…" autocomplete="off">
        </div>
        <div class="filter-row">
          <label for="sort-select">Sort pairs by</label>
          <select id="sort-select">
            <option value="default">Default</option>
            <option value="f1_desc">Note F1 ↓ best</option>
            <option value="f1_asc">Note F1 ↑ worst</option>
            <option value="jsd_asc">Pitch JSD: similar first</option>
            <option value="jsd_desc">Pitch JSD: different first</option>
            <option value="penalty">Cross-score: best first</option>
          </select>
        </div>
      </div>
      <ul id="song-list"></ul>
    </aside>

    <main id="main">
      <!-- populated by app.js -->
    </main>

  </div>
</div>

<script src="assets/app.js"></script>
</body>
</html>
